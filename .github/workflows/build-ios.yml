name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      # ?? 1. ???? ??
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ?? 2. ???? ??
      - name: Install npm dependencies
        run: npm install

      # ?? 3. ?? Capacitor ????? ??
      # ??:CLI ? Core ?????????
      # ?? CLI v7 + Core v8 ?? --packagemanager SPM ???
      - name: Verify Capacitor versions
        run: |
          echo "=== Installed Capacitor packages ==="
          npm ls @capacitor/cli @capacitor/core @capacitor/ios 2>&1 || true
          CLI_VER=$(npx cap --version)
          echo "CLI version: $CLI_VER"
          # Extract major version
          CLI_MAJOR=$(echo "$CLI_VER" | cut -d. -f1)
          if [ "$CLI_MAJOR" != "8" ]; then
            echo "? FATAL: Capacitor CLI must be v8, got v$CLI_VER"
            echo "This means package.json has wrong @capacitor/cli version"
            exit 1
          fi
          echo "? CLI v8 confirmed"

      # ?? 4. ???? ??
      - name: Build web assets
        run: npm run build

      # ?? 5. ?? iOS ?? (SPM ??) ??
      - name: Add iOS platform with SPM
        run: npx cap add ios --packagemanager SPM

      # ?? 6. ???? (????) ??
      - name: Setup app icon
        run: |
          # Convert icon to proper RGBA PNG and place directly into AppIcon.appiconset
          # This bypasses @capacitor/assets entirely to avoid white-border issues
          python3 -c "
          from PIL import Image
          img = Image.open('resources/icon.png').convert('RGBA')
          if img.size != (1024, 1024):
              print(f'Resizing icon from {img.size} to 1024x1024')
              img = img.resize((1024, 1024), Image.LANCZOS)
          img.save('ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon.png', 'PNG')
          print(f'Icon saved: {img.size} {img.mode}')
          "

          # Ensure Contents.json exists with correct format
          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images": [
              {
                "filename": "AppIcon.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSON

          echo "=== Verify AppIcon ==="
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/

      # ?? 7. ?? Capacitor ??
      # cap sync (?? platform ??) ????? SPM
      - name: Sync Capacitor
        run: npx cap sync

      # ?? 8. ???? (?????) ??
      - name: Debug project structure
        if: always()
        run: |
          echo "=== iOS directory structure ==="
          find ios/App -maxdepth 2 -type f -o -type d | head -50
          echo "=== Project files ==="
          find ios/App -maxdepth 1 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \)
          echo "=== Podfile? ==="
          ls -la ios/App/Podfile 2>/dev/null || echo "No Podfile (correct for SPM)"
          echo "=== CapApp-SPM? ==="
          ls -la ios/App/CapApp-SPM/ 2>/dev/null || echo "No CapApp-SPM dir"
          echo "=== AppIcon? ==="
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/ 2>/dev/null || echo "No AppIcon"

      # ?? 9. ?? .app ??
      - name: Build unsigned .app
        run: |
          cd ios/App

          # Determine project file: SPM uses .xcodeproj, CocoaPods uses .xcworkspace
          if [ -f "App.xcworkspace" ]; then
            BUILD_CMD="-workspace App.xcworkspace"
            echo "Using .xcworkspace (CocoaPods mode)"
          elif [ -f "App.xcodeproj" ]; then
            BUILD_CMD="-project App.xcodeproj"
            echo "Using .xcodeproj (SPM mode)"
          else
            echo "? No Xcode project file found!"
            ls -la
            exit 1
          fi

          # List available schemes for debugging
          echo "=== Available schemes ==="
          xcodebuild $BUILD_CMD -list 2>&1 || true

          xcodebuild $BUILD_CMD \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            2>&1 | tee build.log

      # ?? 10. ?? IPA ??
      - name: Package into .ipa
        run: |
          APP_DIR="ios/App/build/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_DIR" ]; then
            echo "? App.app not found at $APP_DIR"
            echo "=== Available products ==="
            find ios/App/build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload
          echo "? IPA created successfully"
          ls -lh MatSci-Calculator.ipa

      # ?? 11. ????????? ??
      - name: Upload debug info on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-info
          path: |
            ios/App/build.log
            ios/**/*.xcconfig
            ios/CapApp-SPM/Package.swift

      # ?? 12. ?? IPA ??
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: warn
