name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform with SPM
        run: npx cap add ios --packagemanager SPM

      - name: Sync Capacitor
        run: npx cap sync

      - name: Setup app icon (after sync, before build)
        run: |
          # Override icon AFTER cap sync so we don't interfere with asset catalog generation
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"

          # sips -z crops (zoom), sips -z 1024 1024 on a 1024x1024 image is safe.
          # But we use --resampleWidth/Height to be safe for any input size.
          sips --resampleWidth 1024 resources/icon.png --out "$ICON_DIR/AppIcon.png"

          # Use Xcode 15+ single-size icon format (iOS 11+)
          cat > "$ICON_DIR/Contents.json" << 'JSONEOF'
          {
            "images": [
              {
                "filename": "AppIcon.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSONEOF

          echo "=== Icon info ==="
          sips -g all "$ICON_DIR/AppIcon.png" | head -10
          ls -la "$ICON_DIR/"

      - name: Fix AppDelegate.swift for Xcode 16.2 compatibility
        run: |
          AD_FILE="ios/App/App/AppDelegate.swift"
          echo "=== Original AppDelegate.swift ==="
          cat "$AD_FILE"
          echo ""

          # Capacitor 8 generates application(_:continue:restorationHandler:) which
          # does NOT exist in ApplicationDelegateProxy for Xcode 16.2 / Swift 5.10.
          # Use Python to precisely remove ONLY that method (brace-depth aware).
          python3 -c "
          import re
          with open('$AD_FILE', 'r') as f:
              lines = f.readlines()
          out = []
          skip = False
          depth = 0
          for line in lines:
              if not skip:
                  if re.search(r'func\s+application\s*\(.*continue\s+userActivity', line):
                      skip = True
                      depth = 0
                      continue
                  out.append(line)
              else:
                  depth += line.count('{') - line.count('}')
                  if depth <= 0 and '}' in line:
                      skip = False
                      continue
          with open('$AD_FILE', 'w') as f:
              f.writelines(out)
          print('Method removed successfully')
          "

          echo "=== Patched AppDelegate.swift ==="
          cat "$AD_FILE"

      - name: Build unsigned .app
        run: |
          # Use the latest available Xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version
          swift --version

          cd "$GITHUB_WORKSPACE/ios/App"

          # SPM uses .xcodeproj, CocoaPods uses .xcworkspace
          if [ -f "App.xcworkspace" ]; then
            BUILD_CMD="-workspace App.xcworkspace"
          else
            BUILD_CMD="-project App.xcodeproj"
          fi

          # List available schemes
          echo "=== Available schemes ==="
          SCHEMES=$(xcodebuild $BUILD_CMD -list 2>&1)
          echo "$SCHEMES"

          # Detect scheme name
          SCHEME="App"
          if echo "$SCHEMES" | grep -q "MatSci Calculator"; then
            SCHEME="MatSci Calculator"
          fi
          echo "Using scheme: $SCHEME"

          # Build — pipe to tee so log is saved AND printed; set -o pipefail preserves exit code
          set -o pipefail
          xcodebuild $BUILD_CMD \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            2>&1 | tee build.log || true
          set +o pipefail

          BUILD_EXIT=$(grep -c "BUILD FAILED" build.log || true)
          if [ "$BUILD_EXIT" -gt 0 ]; then
            echo ""
            echo "========================================="
            echo "  BUILD FAILED — Swift/Compile errors:"
            echo "========================================="
            grep -E "^.+error:.+$" build.log | head -40
            echo ""
            echo "=== GeneratedAssetSymbols context ==="
            grep -B5 -A10 "GeneratedAssetSymbols" build.log | head -60
            echo ""
            echo "=== AppDelegate context ==="
            grep -B3 -A10 "AppDelegate.swift.*error" build.log | head -40
            exit 65
          fi
          echo "Build exit code: 0"

          APP_BUNDLE="build/Build/Products/Release-iphoneos/App.app"
          echo "=== App bundle contents ==="
          ls -la "$APP_BUNDLE/" || echo "App bundle not found at expected path"

          # Check for executable
          if [ ! -f "$APP_BUNDLE/App" ]; then
            echo "⚠️ No executable found in .app bundle!"
            exit 1
          fi
          echo "✅ Executable found"

          # Info.plist: check if it exists and is valid
          if [ -f "$APP_BUNDLE/Info.plist" ]; then
            echo "Info.plist found, dumping CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_BUNDLE/Info.plist" 2>&1
          else
            echo "⚠️ Info.plist missing from .app bundle!"

            # Search for Info.plist, EXCLUDE storyboard ones
            FOUND=$(find build -name "Info.plist" -not -path "*storyboardc*" -not -path "*Assets.car*" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "Found Info.plist at: $FOUND"
              cp "$FOUND" "$APP_BUNDLE/Info.plist"
            else
              # Generate a proper Info.plist from scratch
              echo "Generating Info.plist from scratch..."
              cat > "$APP_BUNDLE/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.welsonslee.matsci.calculator</string>
              <key>CFBundleName</key>
              <string>MatSci Calculator</string>
              <key>CFBundleDisplayName</key>
              <string>MatSci Calculator</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleExecutable</key>
              <string>App</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          PLIST
              echo "Info.plist generated"
            fi
          fi

          # Final verification
          echo "=== Final Info.plist verification ==="
          plutil -lint "$APP_BUNDLE/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_BUNDLE/Info.plist"

      - name: Package into .ipa
        run: |
          PRODUCTS_DIR="$GITHUB_WORKSPACE/ios/App/build/Build/Products/Release-iphoneos"

          if [ ! -d "$PRODUCTS_DIR" ]; then
            echo "❌ Products directory not found"
            exit 1
          fi

          echo "=== Contents of products dir ==="
          ls -la "$PRODUCTS_DIR"

          APP_BUNDLE=$(find "$PRODUCTS_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "❌ No .app bundle found"
            exit 1
          fi
          echo "Found: $APP_BUNDLE"

          # Verify Info.plist exists and is valid
          if [ ! -f "$APP_BUNDLE/Info.plist" ]; then
            echo "❌ Info.plist missing in $APP_BUNDLE"
            ls -la "$APP_BUNDLE/"
            exit 1
          fi
          echo "✅ Info.plist exists"

          plutil -lint "$APP_BUNDLE/Info.plist"
          echo "CFBundleIdentifier: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_BUNDLE/Info.plist")"
          echo "CFBundleExecutable: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_BUNDLE/Info.plist" 2>/dev/null || echo 'MISSING')"

          mkdir -p "$PRODUCTS_DIR/Payload"
          cp -r "$APP_BUNDLE" "$PRODUCTS_DIR/Payload/"
          cd "$PRODUCTS_DIR"
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload

          echo "=== Verify IPA ==="
          unzip -l MatSci-Calculator.ipa | head -20

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            ios/App/build.log
            ios/**/*.xcconfig
            ios/CapApp-SPM/Package.swift

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: warn
