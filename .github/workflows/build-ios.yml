name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform with SPM
        run: npx cap add ios --packagemanager SPM

      - name: Setup app icon (no white border)
        run: |
          # Use macOS built-in sips to ensure icon is 1024x1024 PNG
          # Then copy directly into AppIcon.appiconset (avoids @capacitor/assets white border)
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          sips -z 1024 1024 resources/icon.png --out ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon.png

          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images": [
              {
                "filename": "AppIcon.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSON
          echo "Icon ready:"
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build unsigned .app
        run: |
          cd "$GITHUB_WORKSPACE/ios/App"

          # SPM uses .xcodeproj, CocoaPods uses .xcworkspace
          if [ -f "App.xcworkspace" ]; then
            BUILD_CMD="-workspace App.xcworkspace"
          else
            BUILD_CMD="-project App.xcodeproj"
          fi

          # List available schemes
          echo "=== Available schemes ==="
          SCHEMES=$(xcodebuild $BUILD_CMD -list 2>&1)
          echo "$SCHEMES"

          # Detect scheme name
          SCHEME="App"
          if echo "$SCHEMES" | grep -q "MatSci Calculator"; then
            SCHEME="MatSci Calculator"
          fi
          echo "Using scheme: $SCHEME"

          # Build and capture exit code properly (pipe through cat, not tee, to preserve exit code)
          set -o pipefail
          xcodebuild $BUILD_CMD \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="16.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            2>&1 | tee build.log
          BUILD_EXIT=$?
          set +o pipefail
          echo "Build exit code: $BUILD_EXIT"

          APP_BUNDLE="build/Build/Products/Release-iphoneos/App.app"
          echo "=== App bundle contents ==="
          ls -la "$APP_BUNDLE/" || echo "App bundle not found at expected path"

          # Check for executable
          if [ ! -f "$APP_BUNDLE/App" ]; then
            echo "⚠️ No executable found in .app bundle!"
            echo "Build failed (Swift compilation). Checking build log for errors..."
            grep -E "error:|fatal error:" build.log | tail -20
            echo "Exiting with build failure code"
            exit $BUILD_EXIT
          fi
          echo "✅ Executable found"

          # Info.plist: check if it exists and is valid
          if [ -f "$APP_BUNDLE/Info.plist" ]; then
            echo "Info.plist found, dumping CFBundleIdentifier:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_BUNDLE/Info.plist" 2>&1
          else
            echo "⚠️ Info.plist missing from .app bundle!"

            # Search for Info.plist, EXCLUDE storyboard ones
            FOUND=$(find build -name "Info.plist" -not -path "*storyboardc*" -not -path "*Assets.car*" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "Found Info.plist at: $FOUND"
              cp "$FOUND" "$APP_BUNDLE/Info.plist"
            else
              # Generate a proper Info.plist from scratch
              echo "Generating Info.plist from scratch..."
              cat > "$APP_BUNDLE/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.welsonslee.matsci.calculator</string>
              <key>CFBundleName</key>
              <string>MatSci Calculator</string>
              <key>CFBundleDisplayName</key>
              <string>MatSci Calculator</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleExecutable</key>
              <string>App</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          PLIST
              echo "Info.plist generated"
            fi
          fi

          # Final verification
          echo "=== Final Info.plist verification ==="
          plutil -lint "$APP_BUNDLE/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_BUNDLE/Info.plist"

      - name: Package into .ipa
        run: |
          PRODUCTS_DIR="$GITHUB_WORKSPACE/ios/App/build/Build/Products/Release-iphoneos"

          if [ ! -d "$PRODUCTS_DIR" ]; then
            echo "❌ Products directory not found"
            exit 1
          fi

          echo "=== Contents of products dir ==="
          ls -la "$PRODUCTS_DIR"

          APP_BUNDLE=$(find "$PRODUCTS_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "❌ No .app bundle found"
            exit 1
          fi
          echo "Found: $APP_BUNDLE"

          # Verify Info.plist exists and is valid
          if [ ! -f "$APP_BUNDLE/Info.plist" ]; then
            echo "❌ Info.plist missing in $APP_BUNDLE"
            ls -la "$APP_BUNDLE/"
            exit 1
          fi
          echo "✅ Info.plist exists"

          plutil -lint "$APP_BUNDLE/Info.plist"
          echo "CFBundleIdentifier: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_BUNDLE/Info.plist")"
          echo "CFBundleExecutable: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_BUNDLE/Info.plist" 2>/dev/null || echo 'MISSING')"

          mkdir -p "$PRODUCTS_DIR/Payload"
          cp -r "$APP_BUNDLE" "$PRODUCTS_DIR/Payload/"
          cd "$PRODUCTS_DIR"
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload

          echo "=== Verify IPA ==="
          unzip -l MatSci-Calculator.ipa | head -20

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            ios/App/build.log
            ios/**/*.xcconfig
            ios/CapApp-SPM/Package.swift

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: warn
