name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform with SPM
        run: npx cap add ios --packagemanager SPM

      - name: Setup app icon (no white border)
        run: |
          # Use macOS built-in sips to ensure icon is 1024x1024 PNG
          # Then copy directly into AppIcon.appiconset (avoids @capacitor/assets white border)
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          sips -z 1024 1024 resources/icon.png --out ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon.png

          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images": [
              {
                "filename": "AppIcon.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSON
          echo "Icon ready:"
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build unsigned .app
        run: |
          cd ios/App

          # SPM uses .xcodeproj, CocoaPods uses .xcworkspace
          if [ -f "App.xcworkspace" ]; then
            BUILD_CMD="-workspace App.xcworkspace"
          else
            BUILD_CMD="-project App.xcodeproj"
          fi

          xcodebuild $BUILD_CMD \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            2>&1 | tee build.log

      - name: Package into .ipa
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            ios/App/build.log
            ios/**/*.xcconfig
            ios/CapApp-SPM/Package.swift

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: warn
