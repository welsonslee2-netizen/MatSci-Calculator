name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor iOS platform
        run: npm install @capacitor/ios@8 --save-dev

      - name: Install @capacitor/assets for icon generation
        run: npm install @capacitor/assets --save-dev

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Fix iOS deployment target in Podfile
        run: |
          cd ios/App
          # Replace the deployment target to match what Capacitor 8 requires
          sed -i '' 's/platform :ios.*/platform :ios, "15.0"/' Podfile

      - name: Generate iOS icons from source image
        run: npx capacitor-assets generate --ios

      - name: Install CocoaPods dependencies
        run: cd ios/App && pod install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build for generic iOS device (unsigned .app)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app into .ipa
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: error
