name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor iOS platform (match core version)
        run: npm install @capacitor/ios@8 --save-dev

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform with SPM
        run: npx cap add ios --packagemanager SPM

      - name: Generate iOS icons and splash (no white border)
        run: |
          # Install icon generation tool
          npm install @capacitor/assets --save-dev

          # Ensure icon source is RGBA PNG 1024x1024 (avoid palette mode issues)
          python3 -c "
          from PIL import Image
          img = Image.open('resources/icon.png').convert('RGBA')
          img.save('assets/icon-only.png', 'PNG')
          print(f'icon-only.png: {img.size} {img.mode}')
          "

          # Generate with background color matching app theme (#F4F7FB)
          # This prevents white borders on adaptive icons
          npx capacitor-assets generate --ios \
            --icon-background-color '#F4F7FB' \
            --icon-background-color-dark '#1C1C1E' || true

          # Fallback: if generate failed, manually place icon into AppIcon
          if [ ! -d "ios/App/App/Assets.xcassets/AppIcon.appiconset" ]; then
            echo "⚠️ capacitor-assets failed, setting up AppIcon manually"
            mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
            python3 -c "
          from PIL import Image
          img = Image.open('resources/icon.png').convert('RGBA').resize((1024,1024), Image.LANCZOS)
          img.save('ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon.png', 'PNG')
          "
            cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images": [
              {
                "filename": "AppIcon.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSON
          fi

          # Verify icons exist
          echo "=== AppIcon contents ==="
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/ || echo "AppIcon dir not found!"

      - name: Sync Capacitor (auto-detect SPM)
        run: npx cap sync

      - name: Verify project structure
        run: |
          echo "=== iOS project structure ==="
          ls ios/App/
          echo "=== SPM directory ==="
          ls ios/App/CapApp-SPM/ 2>/dev/null || echo "No CapApp-SPM dir"
          echo "=== Podfile existence ==="
          ls ios/App/Podfile 2>/dev/null || echo "No Podfile (good - using SPM)"
          echo "=== Project files ==="
          ls ios/App/*.xcodeproj ios/App/*.xcworkspace 2>/dev/null || echo "Checking deeper..."
          find ios/App -maxdepth 1 -name "*.xcodeproj" -o -name "*.xcworkspace" 2>/dev/null

      - name: Build unsigned .app
        run: |
          cd ios/App
          # Determine project file type (SPM uses .xcodeproj, CocoaPods uses .xcworkspace)
          if [ -f "App.xcworkspace" ]; then
            PROJECT_CMD="-workspace App.xcworkspace"
            echo "Using workspace (CocoaPods)"
          else
            PROJECT_CMD="-project App.xcodeproj"
            echo "Using project (SPM)"
          fi

          xcodebuild $PROJECT_CMD \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            2>&1 | tee build.log

      - name: Package into .ipa
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            ios/App/build.log
            ios/App/**/*.xcconfig

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: warn
