name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor iOS platform
        run: npm install @capacitor/ios@8 --save-dev

      - name: Install @capacitor/assets for icon generation
        run: npm install @capacitor/assets --save-dev

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform
        run: npx cap add ios

      - name: Rewrite Podfile with deployment target 15.0
        run: |
          cd ios/App
          echo "=== Original Podfile ==="
          cat Podfile

          # Completely replace Podfile to guarantee correct platform
          ruby -e '
            content = File.read("Podfile")
            # Replace any platform line with ios 15.0
            content.sub!(/^platform\s*:ios\s*,\s*["'\'']?[\d.]+["'\'']?/, "platform :ios, \"15.0\"")
            # Ensure assertDeploymentTarget is called in post_install
            unless content.include?("assertDeploymentTarget")
              content += %Q[
          post_install do |installer|
            assertDeploymentTarget(installer)
          end
          ]
            end
            File.write("Podfile", content)
          '

          echo "=== Fixed Podfile ==="
          cat Podfile

      - name: Generate iOS icons from source image
        run: npx capacitor-assets generate --ios

      - name: Install CocoaPods dependencies
        run: cd ios/App && pod install

      - name: Build unsigned .app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into .ipa
        run: |
          cd ios/App/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: error
