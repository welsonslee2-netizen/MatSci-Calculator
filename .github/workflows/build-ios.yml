name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add iOS platform with SPM
        run: npx cap add ios --packagemanager SPM

      - name: Setup app icon (no white border)
        run: |
          # Use macOS built-in sips to ensure icon is 1024x1024 PNG
          # Then copy directly into AppIcon.appiconset (avoids @capacitor/assets white border)
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          sips -z 1024 1024 resources/icon.png --out ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon.png

          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images": [
              {
                "filename": "AppIcon.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          JSON
          echo "Icon ready:"
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build unsigned .app
        run: |
          # Build from project root
          cd "$GITHUB_WORKSPACE/ios/App"

          # SPM uses .xcodeproj, CocoaPods uses .xcworkspace
          if [ -f "App.xcworkspace" ]; then
            BUILD_CMD="-workspace App.xcworkspace"
          else
            BUILD_CMD="-project App.xcodeproj"
          fi

          # List available schemes
          echo "=== Available schemes ==="
          SCHEMES=$(xcodebuild $BUILD_CMD -list 2>&1)
          echo "$SCHEMES"

          # Detect scheme name
          SCHEME="App"
          if echo "$SCHEMES" | grep -q "MatSci Calculator"; then
            SCHEME="MatSci Calculator"
          fi
          echo "Using scheme: $SCHEME"

          xcodebuild $BUILD_CMD \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET="15.0" \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            2>&1 | tee build.log

          # Fix: Ensure Info.plist exists in .app bundle
          APP_BUNDLE="build/Build/Products/Release-iphoneos/App.app"
          if [ ! -f "$APP_BUNDLE/Info.plist" ]; then
            echo "⚠️ Info.plist missing, searching..."
            FOUND_PLIST=$(find build -name "Info.plist" -path "*App.build*" 2>/dev/null | head -1)
            if [ -n "$FOUND_PLIST" ]; then
              echo "Copying from: $FOUND_PLIST"
              cp "$FOUND_PLIST" "$APP_BUNDLE/Info.plist"
              echo "✅ Info.plist copied"
            else
              echo "Trying to generate minimal Info.plist..."
              /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.welsonslee.matsci.calculator" "$APP_BUNDLE/Info.plist" 2>/dev/null || true
            fi
          fi

          echo "=== App bundle contents ==="
          ls -la "$APP_BUNDLE/"

      - name: Package into .ipa
        run: |
          PRODUCTS_DIR="$GITHUB_WORKSPACE/ios/App/build/Build/Products/Release-iphoneos"

          if [ ! -d "$PRODUCTS_DIR" ]; then
            echo "❌ Products directory not found"
            exit 1
          fi

          echo "=== Contents of products dir ==="
          ls -la "$PRODUCTS_DIR"

          APP_BUNDLE=$(find "$PRODUCTS_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "❌ No .app bundle found"
            exit 1
          fi
          echo "Found: $APP_BUNDLE"

          if [ ! -f "$APP_BUNDLE/Info.plist" ]; then
            echo "❌ Info.plist missing in $APP_BUNDLE"
            ls -la "$APP_BUNDLE/"
            exit 1
          fi
          echo "✅ Info.plist exists"

          mkdir -p "$PRODUCTS_DIR/Payload"
          cp -r "$APP_BUNDLE" "$PRODUCTS_DIR/Payload/"
          cd "$PRODUCTS_DIR"
          zip -r MatSci-Calculator.ipa Payload/
          rm -rf Payload

          echo "=== Verify IPA ==="
          unzip -l MatSci-Calculator.ipa | head -20

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            ios/App/build.log
            ios/**/*.xcconfig
            ios/CapApp-SPM/Package.swift

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatSci-Calculator-iOS
          path: ios/App/build/Build/Products/Release-iphoneos/MatSci-Calculator.ipa
          if-no-files-found: error
          if-no-files-found: warn
