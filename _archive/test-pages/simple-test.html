<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简 MathLive 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    math-field {
      display: block;
      width: 100%;
      min-height: 80px;
      padding: 15px;
      margin: 20px 0;
      border: 2px solid #1f5e87;
      border-radius: 8px;
      font-size: 1.2rem;
      background: white;
    }
    .info {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      background: #1f5e87;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🧪 极简 MathLive 测试</h1>
  
  <div class="info">
    <strong>说明：</strong>这是一个最简单的测试页面，没有任何复杂代码。
    <br>如果这里可以输入，说明 MathLive 本身没问题。
  </div>
  
  <h2>测试输入框：</h2>
  <math-field id="mf" virtual-keyboard-mode="off">
    x^2 + y^2
  </math-field>
  
  <div>
    <button onclick="focusField()">聚焦</button>
    <button onclick="insertText()">插入文本</button>
    <button onclick="getValue()">获取值</button>
  </div>
  
  <div id="output" style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px;">
    等待操作...
  </div>

  <!-- 直接加载 MathLive -->
  <script src="https://unpkg.com/mathlive@0.98.5/dist/mathlive.min.js"></script>
  
  <script>
    const output = document.getElementById('output');
    
    function log(msg) {
      output.innerHTML = msg + '<br><br>' + output.innerHTML;
      console.log(msg);
    }
    
    // 检查加载状态
    window.addEventListener('load', function() {
      setTimeout(() => {
        if (window.MathLive) {
          log('✅ MathLive 已加载');
        } else {
          log('❌ MathLive 未加载');
          return;
        }
        
        const mf = document.getElementById('mf');
        if (mf && mf.tagName === 'MATH-FIELD') {
          log('✅ math-field 元素就绪');
          
          // 添加事件监听
          mf.addEventListener('click', () => log('👆 被点击'));
          mf.addEventListener('focus', () => log('✅ 获得焦点'));
          mf.addEventListener('input', () => log('⌨️ 输入: ' + mf.getValue()));
          
          // 自动聚焦
          setTimeout(() => {
            mf.focus();
            log('✅ 自动聚焦完成，现在可以尝试输入了！');
          }, 500);
        } else {
          log('❌ math-field 元素未就绪');
        }
      }, 1000);
    });
    
    function focusField() {
      const mf = document.getElementById('mf');
      mf.focus();
      log('✅ 手动聚焦');
    }
    
    function insertText() {
      const mf = document.getElementById('mf');
      mf.focus();
      mf.executeCommand('insert', '\\alpha + \\beta');
      log('✅ 插入: α + β');
      log('当前值: ' + mf.getValue());
    }
    
    function getValue() {
      const mf = document.getElementById('mf');
      log('当前 LaTeX 值: ' + mf.getValue());
    }
  </script>
</body>
</html>
