<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatSci Calculator - Test Suite (Fixed)</title>
  <!-- 加载所有应用依赖 -->
  <script defer src="https://cdn.jsdelivr.net/npm/mathjs@12.4.2/lib/browser/math.js"></script>
  <script defer src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script defer id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script defer src="data/constants.js"></script>
  <script defer src="data/elements.js"></script>
  <script defer src="modules/utils.js"></script>
  <script defer src="modules/models.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      padding: 2rem;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #1f5e87; margin-bottom: 0.5rem; }
    .subtitle { color: #60758a; margin-bottom: 2rem; }
    .test-section {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .test-section h2 {
      color: #173047;
      font-size: 1.25rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-icon {
      width: 24px; height: 24px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .status-pending { background: #ffd93d; color: #856404; }
    .status-pass { background: #6bcb77; color: white; }
    .status-fail { background: #ff6b6b; color: white; }
    .test-item {
      padding: 0.75rem; margin: 0.5rem 0;
      border-left: 3px solid #e0e0e0;
      background: #fafafa; border-radius: 4px;
    }
    .test-item.pass { border-left-color: #6bcb77; background: #f0fff4; }
    .test-item.fail { border-left-color: #ff6b6b; background: #fff5f5; }
    .test-name { font-weight: 600; color: #333; margin-bottom: 0.25rem; }
    .test-detail { font-size: 0.9rem; color: #666; font-family: monospace; }
    .test-result { margin-top: 0.5rem; font-size: 0.85rem; }
    .result-pass { color: #2d7a3a; }
    .result-fail { color: #c53030; }
    .controls {
      display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    button {
      padding: 0.75rem 1.5rem; border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
      font-size: 0.95rem;
    }
    .btn-primary {
      background: linear-gradient(145deg, #1f5e87, #2b7691);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(31, 94, 135, 0.3);
    }
    .btn-secondary {
      background: white; color: #1f5e87;
      border: 2px solid #1f5e87;
    }
    .btn-secondary:hover { background: #f0f7ff; }
    .summary {
      background: linear-gradient(145deg, #1f5e87, #2b7691);
      color: white; padding: 1.5rem; border-radius: 12px;
      margin-bottom: 2rem;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }
    .summary-item { text-align: center; }
    .summary-value { font-size: 2rem; font-weight: 700; display: block; }
    .summary-label { font-size: 0.85rem; opacity: 0.9; }
    .progress-bar {
      width: 100%; height: 8px; background: rgba(255,255,255,0.2);
      border-radius: 4px; overflow: hidden; margin-top: 1rem;
      grid-column: 1 / -1;
    }
    .progress-fill {
      height: 100%; background: #6bcb77;
      transition: width 0.3s ease; width: 0%;
    }
    .loading {
      text-align: center; padding: 2rem; color: #60758a;
    }
    .error-box {
      background: #fff5f5; border: 2px solid #ff6b6b;
      border-radius: 8px; padding: 1rem; margin: 1rem 0;
      color: #c53030;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 MatSci Calculator Lab - 自动化测试套件</h1>
    <p class="subtitle">修复版 - 已正确加载所有依赖</p>
    
    <div id="loading-msg" class="loading">
      ⏳ 正在加载应用模块...请稍候
    </div>
    
    <div id="error-box" class="error-box" style="display: none;"></div>
    
    <div class="controls" id="controls" style="display: none;">
      <button class="btn-primary" onclick="runAllTests()">▶ 运行全部测试</button>
      <button class="btn-secondary" onclick="openMainApp()">🌐 打开主应用</button>
      <button class="btn-secondary" onclick="clearResults()">🗑 清除结果</button>
    </div>
    
    <div id="summary" class="summary" style="display: none;">
      <div class="summary-item">
        <span class="summary-value" id="total-tests">0</span>
        <span class="summary-label">总测试数</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="passed-tests">0</span>
        <span class="summary-label">通过</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="failed-tests">0</span>
        <span class="summary-label">失败</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="pass-rate">0%</span>
        <span class="summary-label">通过率</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    
    <div id="test-results"></div>
  </div>

  <script>
    let testResults = [];
    let modulesLoaded = false;
    
    // 等待所有模块加载完成
    window.addEventListener('load', function() {
      setTimeout(checkModulesLoaded, 500);
    });
    
    function checkModulesLoaded() {
      const loadingMsg = document.getElementById('loading-msg');
      const errorBox = document.getElementById('error-box');
      const controls = document.getElementById('controls');
      
      // 检查关键模块
      const checks = {
        'MSCLab': !!window.MSCLab,
        'constantsData': !!(window.MSCLab && window.MSCLab.constantsData),
        'elementsData': !!(window.MSCLab && window.MSCLab.elementsData),
        'Utils': !!(window.MSCLab && window.MSCLab.Utils),
        'Models': !!(window.MSCLab && window.MSCLab.Models),
        'math.js': !!window.math,
        'Plotly': !!window.Plotly
      };
      
      const allLoaded = Object.values(checks).every(v => v);
      
      if (allLoaded) {
        modulesLoaded = true;
        loadingMsg.innerHTML = '✅ 所有模块加载成功！可以点击"运行全部测试"开始';
        loadingMsg.style.color = '#6bcb77';
        controls.style.display = 'flex';
        
        console.log('✅ 模块加载状态:', checks);
      } else {
        const failed = Object.entries(checks).filter(([k,v]) => !v).map(([k]) => k);
        loadingMsg.innerHTML = '❌ 部分模块加载失败';
        loadingMsg.style.color = '#ff6b6b';
        
        errorBox.style.display = 'block';
        errorBox.innerHTML = `
          <strong>加载失败的模块：</strong><br>
          ${failed.join('<br>')}<br><br>
          <strong>可能原因：</strong><br>
          1. CDN连接问题（检查网络）<br>
          2. 文件路径错误（确认data/和modules/文件夹存在）<br>
          3. 浏览器阻止了本地文件访问<br><br>
          <strong>解决方案：</strong><br>
          - 使用Chrome/Edge浏览器<br>
          - 确保从项目根目录打开此文件<br>
          - 或使用本地服务器: npx http-server -p 8080
        `;
        
        console.error('❌ 模块加载失败:', failed);
      }
    }
    
    function openMainApp() {
      window.open('index.html', '_blank');
    }
    
    function clearResults() {
      document.getElementById('test-results').innerHTML = '';
      document.getElementById('summary').style.display = 'none';
      testResults = [];
    }
    
    function addTestResult(section, name, passed, detail, expected, actual) {
      const result = { section, name, passed, detail, expected, actual };
      testResults.push(result);
      renderTestResult(result);
      updateSummary();
    }
    
    function renderTestResult(result) {
      const container = document.getElementById('test-results');
      let sectionEl = container.querySelector(`[data-section="${result.section}"]`);
      
      if (!sectionEl) {
        sectionEl = document.createElement('div');
        sectionEl.className = 'test-section';
        sectionEl.dataset.section = result.section;
        sectionEl.innerHTML = `
          <h2>
            <span class="status-icon status-pending" id="icon-${result.section.replace(/\s+/g, '-')}">⏳</span>
            ${result.section}
          </h2>
          <div class="test-list"></div>
        `;
        container.appendChild(sectionEl);
      }
      
      const testList = sectionEl.querySelector('.test-list');
      const testEl = document.createElement('div');
      testEl.className = `test-item ${result.passed ? 'pass' : 'fail'}`;
      
      let resultHtml = '';
      if (result.expected !== undefined) {
        resultHtml = `
          <div class="test-result">
            <div class="${result.passed ? 'result-pass' : 'result-fail'}">
              ${result.passed ? '✓' : '✗'} 
              预期: ${result.expected} | 实际: ${result.actual}
            </div>
          </div>
        `;
      }
      
      testEl.innerHTML = `
        <div class="test-name">${result.name}</div>
        ${result.detail ? `<div class="test-detail">${result.detail}</div>` : ''}
        ${resultHtml}
      `;
      
      testList.appendChild(testEl);
    }
    
    function updateSummary() {
      const total = testResults.length;
      const passed = testResults.filter(r => r.passed).length;
      const failed = total - passed;
      const rate = total > 0 ? Math.round((passed / total) * 100) : 0;
      
      document.getElementById('total-tests').textContent = total;
      document.getElementById('passed-tests').textContent = passed;
      document.getElementById('failed-tests').textContent = failed;
      document.getElementById('pass-rate').textContent = rate + '%';
      document.getElementById('progress-fill').style.width = rate + '%';
      document.getElementById('summary').style.display = 'grid';
      
      // 更新章节图标
      const sections = {};
      testResults.forEach(r => {
        if (!sections[r.section]) sections[r.section] = { total: 0, passed: 0 };
        sections[r.section].total++;
        if (r.passed) sections[r.section].passed++;
      });
      
      Object.keys(sections).forEach(section => {
        const s = sections[section];
        const iconId = `icon-${section.replace(/\s+/g, '-')}`;
        const iconEl = document.getElementById(iconId);
        if (iconEl) {
          if (s.passed === s.total) {
            iconEl.className = 'status-icon status-pass';
            iconEl.textContent = '✓';
          } else if (s.passed === 0) {
            iconEl.className = 'status-icon status-fail';
            iconEl.textContent = '✗';
          } else {
            iconEl.className = 'status-icon status-pending';
            iconEl.textContent = '◐';
          }
        }
      });
    }
    
    async function runAllTests() {
      if (!modulesLoaded) {
        alert('模块未完全加载，请刷新页面重试');
        return;
      }
      
      clearResults();
      console.log('🚀 开始运行测试套件...');
      
      await testDataIntegrity();
      await testMathFunctions();
      await testUnitConversions();
      await testStrengtheningModels();
      
      console.log('✅ 测试完成！');
    }
    
    // 测试1: 数据完整性
    async function testDataIntegrity() {
      const section = '数据完整性检查';
      
      try {
        if (window.MSCLab && window.MSCLab.constantsData) {
          const count = window.MSCLab.constantsData.length;
          addTestResult(section, '常数数据加载', true, `加载了 ${count} 个常数`);
          
          const first = window.MSCLab.constantsData[0];
          const hasFields = first.id && first.name && first.symbol && first.value !== undefined;
          addTestResult(section, '常数数据结构', hasFields, '检查必需字段', 'id,name,symbol,value', hasFields ? '✓' : '✗');
        } else {
          addTestResult(section, '常数数据加载', false, 'constantsData 未定义');
        }
        
        if (window.MSCLab && window.MSCLab.elementsData) {
          const count = window.MSCLab.elementsData.length;
          addTestResult(section, '元素数据加载', true, `加载了 ${count} 个元素`);
          
          const first = window.MSCLab.elementsData[0];
          const hasFields = first.symbol && first.name && first.atomicNumber;
          addTestResult(section, '元素数据结构', hasFields, '检查必需字段', 'symbol,name,atomicNumber', hasFields ? '✓' : '✗');
        } else {
          addTestResult(section, '元素数据加载', false, 'elementsData 未定义');
        }
        
        if (window.MSCLab && window.MSCLab.Utils) {
          addTestResult(section, '工具函数模块', true, 'Utils模块已加载');
        } else {
          addTestResult(section, '工具函数模块', false, 'Utils模块未加载');
        }
        
        if (window.MSCLab && window.MSCLab.Models) {
          addTestResult(section, '计算模型模块', true, 'Models模块已加载');
        } else {
          addTestResult(section, '计算模型模块', false, 'Models模块未加载');
        }
        
      } catch (error) {
        addTestResult(section, '数据检查异常', false, error.message);
      }
    }
    
    // 测试2: 数学函数
    async function testMathFunctions() {
      const section = '数学函数验证';
      
      if (!window.MSCLab || !window.MSCLab.Models) {
        addTestResult(section, '跳过测试', false, 'Models模块未加载');
        return;
      }
      
      const Models = window.MSCLab.Models;
      
      try {
        const r1 = Models.evaluateExpression('2 + 3 * 4');
        addTestResult(section, '基础运算: 2+3*4', r1 === 14, '混合运算优先级', '14', r1);
        
        const r2 = Models.evaluateExpression('sin(pi/2)');
        addTestResult(section, '三角函数: sin(π/2)', Math.abs(r2 - 1) < 0.0001, '正弦函数', '≈1', r2.toFixed(6));
        
        const r3 = Models.evaluateExpression('sqrt(16)');
        addTestResult(section, '平方根: √16', r3 === 4, '平方根计算', '4', r3);
        
        const r4 = Models.evaluateExpression('log10(1000)');
        addTestResult(section, '对数: log₁₀(1000)', r4 === 3, '常用对数', '3', r4);
        
        const deriv = Models.numericalDerivative('x^2', 3, 1e-5);
        addTestResult(section, '数值导数: d(x²)/dx @ x=3', Math.abs(deriv - 6) < 0.01, '导数应为2x=6', '≈6', deriv.toFixed(4));
        
        const integral = Models.definiteIntegral('x^2', 0, 1, 100);
        addTestResult(section, '定积分: ∫₀¹x²dx', Math.abs(integral - 1/3) < 0.001, '积分应为1/3', '≈0.333', integral.toFixed(4));
        
      } catch (error) {
        addTestResult(section, '数学函数测试', false, error.message);
      }
    }
    
    // 测试3: 单位转换
    async function testUnitConversions() {
      const section = '单位转换系统';
      
      if (!window.MSCLab || !window.MSCLab.Models) {
        addTestResult(section, '跳过测试', false, 'Models模块未加载');
        return;
      }
      
      try {
        const hp = Models.hallPetch({
          sigma0: 180, sigma0Unit: 'MPa', ky: 0.7,
          grainSize: 12, grainUnit: 'um'
        });
        
        addTestResult(section, 'Hall-Petch默认值', hp.incrementMPa > 0 && hp.totalYieldMPa > 180, 
          '增量和总强度应为正值', '>0', `Δσ=${hp.incrementMPa.toFixed(2)} MPa`);
        
        const dis = Models.dislocation({ alpha: 0.24, G: 79, b: 0.248, rho: 2.0e14 });
        addTestResult(section, '位错强化计算', dis.incrementMPa > 0, '应为正值', '>0', `${dis.incrementMPa.toFixed(2)} MPa`);
        
        const cut = Models.cutting({ radius: 12, fraction: 0.08, apb: 150, G: 80, b: 0.255, k: 0.75 });
        addTestResult(section, '切割强化计算', cut.incrementMPa > 0, '应为正值', '>0', `${cut.incrementMPa.toFixed(2)} MPa`);
        
        const or = Models.orowan({ G: 80, b: 0.255, radius: 18, spacing: 60, nu: 0.30 });
        addTestResult(section, 'Orowan强化计算', or.incrementMPa > 0, '应为正值', '>0', `${or.incrementMPa.toFixed(2)} MPa`);
        
      } catch (error) {
        addTestResult(section, '单位转换测试', false, error.message);
      }
    }
    
    // 测试4: 强化模型边界条件
    async function testStrengtheningModels() {
      const section = '强化模型边界条件';
      
      if (!window.MSCLab || !window.MSCLab.Models) {
        addTestResult(section, '跳过测试', false, 'Models模块未加载');
        return;
      }
      
      const Models = window.MSCLab.Models;
      
      try {
        let errorThrown = false;
        try {
          Models.hallPetch({ sigma0: -100, sigma0Unit: 'MPa', ky: 0.7, grainSize: 12, grainUnit: 'um' });
        } catch (e) { errorThrown = true; }
        addTestResult(section, 'Hall-Petch负值检测', errorThrown, '应拒绝负的应力值', '抛出错误', errorThrown ? '✓' : '✗');
        
        errorThrown = false;
        try {
          Models.cutting({ radius: 12, fraction: 1.5, apb: 150, G: 80, b: 0.255, k: 0.75 });
        } catch (e) { errorThrown = true; }
        addTestResult(section, 'Cutting体积分数检测', errorThrown, '应拒绝f≥1', '抛出错误', errorThrown ? '✓' : '✗');
        
      } catch (error) {
        addTestResult(section, '边界条件测试', false, error.message);
      }
    }
    
    console.log('%c🧪 测试套件已就绪', 'color: #1f5e87; font-size: 16px; font-weight: bold;');
    console.log('等待模块加载...');
  </script>
</body>
</html>
